backend:
  name: github
  repo: Anandkumarjha11110/geopolis-site
  branch: main
  base_url: https://geopolis-oauth.anandkumarjha11110.workers.dev

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
