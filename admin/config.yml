backend:
  name: github
  repo: anandkumarjha11110/geopolis-site
  branch: main
  base_url: https://geopolis-site.pages.dev
  auth_endpoint: /api/auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "articles"
    label: "Publications"
    folder: "content/articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string", default: "GEOPOLIS Editorial Board" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["Research Articles", "Geopolitics", "Policy", "General"] }
      - { label: "Abstract", name: "abstract", widget: "text", required: false }
      - { label: "Keywords", name: "keywords", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "string", required: false }
      - { label: "PDF URL", name: "pdf", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "team"
    label: "Team Members"
    folder: "content/team"
    create: true
    slug: "{{name}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Bio", name: "bio", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
